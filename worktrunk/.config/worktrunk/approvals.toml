ln -sf {{ repo_path }}/../env/vscode/tasks.json {{ worktree_path }}/.vscode/
""",
    """
yarn set version 4.7.0
echo "node: $(node --version)"
echo "yarn: $(yarn --version)"
time yarn install
""",
    """
git push -u origin {{ branch }} --no-verify
git branch --set-upstream-to=origin/{{ branch }}
""",
    """
windsurf .
~/.bun/bin/bun run /Users/joe/Projects/js_for_fun/apply_vs_code_theme/index.ts || true
""",
