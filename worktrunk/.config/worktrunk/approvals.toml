[projects."github.com/EmpoHealth/core"]
approved-commands = [
    "mkdir -p {{ worktree_path }}/.vscode",
    "wt step copy-ignored",
    """
ln -sf {{ repo_path }}/../env/.env.server {{ worktree_path }}/workspaces/backend-api/.env
ln -sf {{ repo_path }}/../env/.env.app {{ worktree_path }}/workspaces/frontend-app/.env
ln -sf {{ repo_path }}/../env/.env.qa {{ worktree_path }}/workspaces/qa/.env
ln -sf {{ repo_path }}/../env/.env.rhl-api-tools {{ worktree_path }}/workspaces/helper-scripts/rhl-api-tools/.env
ln -sf {{ repo_path }}/../env/vscode/launch.json {{ worktree_path }}/.vscode/
ln -sf {{ repo_path }}/../env/vscode/tasks.json {{ worktree_path }}/.vscode/
""",
    """
yarn set version 4.7.0
echo "node: $(node --version)"
echo "yarn: $(yarn --version)"
time yarn install
""",
    """
git push -u origin {{ branch }} --no-verify
git branch --set-upstream-to=origin/{{ branch }}
""",
    """
windsurf .
~/.bun/bin/bun run /Users/joe/Projects/js_for_fun/apply_vs_code_theme/index.ts || true
""",
    "zoxide add {{ worktree_path }}",
    """
ln -sf {{ repo_path }}/../env/.env.backend-api {{ worktree_path }}/workspaces/backend-api/.env
ln -sf {{ repo_path }}/../env/.env.frontend-app {{ worktree_path }}/workspaces/frontend-app/.env
ln -sf {{ repo_path }}/../env/.env.qa {{ worktree_path }}/workspaces/qa/.env
ln -sf {{ repo_path }}/../env/.env.rhl-api-tools {{ worktree_path }}/workspaces/helper-scripts/rhl-api-tools/.env
ln -sf {{ repo_path }}/../env/vscode/launch.json {{ worktree_path }}/.vscode/
ln -sf {{ repo_path }}/../env/vscode/tasks.json {{ worktree_path }}/.vscode/
""",
    "mkdir -p {{ worktree_path }}/.config",
    "ln -sf /Users/joe/Projects/js_for_fun/git-tools-js/.config/wt.toml {{ worktree_path }}/.config/wt.toml",
    "~/.bun/bin/bun run --cwd /Users/joe/Projects/empo_health/scripts/infisical-update-env-vars start --env all",
    """
agy-ide .
~/.bun/bin/bun run /Users/joe/Projects/js_for_fun/apply_vs_code_theme/index.ts || true
""",
    """
cmux-tab --name "omp $(basename $PWD)" --command "omp"
agy-ide .
~/.bun/bin/bun run /Users/joe/Projects/js_for_fun/apply_vs_code_theme/index.ts || true
""",
    """
$EDITOR .
~/.bun/bin/bun run /Users/joe/Projects/js_for_fun/apply_vs_code_theme/index.ts || true
""",
    """
export CMUX_QUIET=1

# Skip if a cmux workspace for this branch already exists
WORKSPACE_REF=$(cmux list-workspaces --json 2>/dev/null | jq -r --arg t "{{ branch | sanitize }}" '.workspaces[] | select(.title == $t) | .ref' | head -1)
[ -n "$WORKSPACE_REF" ] && exit 0

# Create the workspace and start Devin in the new worktree
cmux new-workspace --name "{{ branch | sanitize }}" --cwd "{{ worktree_path }}" --command "devin" --focus true

# Resolve the new workspace and its first surface
WORKSPACE_REF=$(cmux list-workspaces --json 2>/dev/null | jq -r --arg t "{{ branch | sanitize }}" '.workspaces[] | select(.title == $t) | .ref' | head -1)
[ -n "$WORKSPACE_REF" ] || exit 0

SURFACE_REF=$(cmux list-pane-surfaces --workspace "$WORKSPACE_REF" --json 2>/dev/null | jq -r '.surfaces[0].ref')
[ -n "$SURFACE_REF" ] || exit 0

# Rename the terminal tab to "devin <branch>"
cmux rename-tab --workspace "$WORKSPACE_REF" --surface "$SURFACE_REF" "devin {{ branch }}"
""",
]
